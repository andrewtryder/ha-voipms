name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tests:
    name: Run Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-homeassistant-custom-component zeep voluptuous pytest-asyncio
      - name: Run tests
        run: |
          PYTHONPATH=. pytest tests/
