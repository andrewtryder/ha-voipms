version: '3'
services:
  homeassistant:
    container_name: homeassistant
    image: "ghcr.io/home-assistant/home-assistant:stable"
    volumes:
      - ./config:/config
      - ./custom_components/voipms:/config/custom_components/voipms
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    ports:
      - "8123:8123"
    environment:
      # Optional: set your VoIP.ms credentials for local testing (do NOT commit real values)
      - VOIPMS_USERNAME=your_username
      - VOIPMS_PASSWORD=your_password
      - VOIPMS_DEFAULT_DID=your_default_did
